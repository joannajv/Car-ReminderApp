<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Maintenance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen maintenance redesigned-screen">
      <a class="top-icon-button back-icon-button" href="index.html" aria-label="Back">
        <img src="assets/arrow.png?v=20260428" alt="" />
      </a>
      <a class="top-icon-button settings-top-button" href="index.html" aria-label="Home">
        <img src="assets/house.png?v=20260428" alt="" />
      </a>
      <label class="search-pill" for="searchPartsInput">
        <span class="sr-only">Search Parts</span>
        <input id="searchPartsInput" class="search-pill-input" type="search" placeholder="Search Parts" autocomplete="off" />
      </label>
      <div class="maintenance-heading-row">
        <img class="maintenance-heading-icon" src="assets/house.png?v=20260429" alt="" />
        <h1 class="maintenance-title">What are you looking for Today?</h1>
      </div>
      <section class="maintenance-content" id="maintenanceContent">
        <a class="maintenance-tile active" href="maintenance-opened.html" data-search="oil fluids chemicals oil change filter maintenance">
          <img class="tile-icon" src="assets/tire.png?v=20260429" alt="" />
          <span>Oil, Fluids, and Chemicals</span>
        </a>
        <article class="maintenance-tile"></article>
        <article class="maintenance-tile"></article>
        <article class="maintenance-tile"></article>
        <article class="maintenance-tile"></article>
        <article class="maintenance-tile"></article>
        <article class="maintenance-tile"></article>
        <article class="maintenance-tile"></article>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script>
      const searchPartsInput = document.getElementById("searchPartsInput");
      const maintenanceContent = document.getElementById("maintenanceContent");
      const maintenanceTiles = Array.from(maintenanceContent?.querySelectorAll(".maintenance-tile") || []);

      searchPartsInput?.addEventListener("input", () => {
        const query = searchPartsInput.value.trim().toLowerCase();

        maintenanceTiles.forEach((tile) => {
          const searchText = (tile.dataset.search || "").toLowerCase();
          const isPlaceholder = !searchText;
          const matches = !query || (!isPlaceholder && searchText.includes(query));

          tile.hidden = query ? !matches : false;
        });
      });
    </script>
    <script src="page-transitions.js"></script>
  </body>
</html>
