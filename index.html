<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#374957" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Car Buddy" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/blob.png" />
    <title>Car App - Figma Build</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
  </head>
  <body>
    <main class="screen homepage redesigned-screen homepage--scrollable">
      <div class="homepage-scroll-stack">
        <header class="home-header">
          <p id="homeGreeting">Welcome, User!</p>
          <a class="home-menu-link" href="settings.html" aria-label="Open profile settings">
            <span class="home-menu-hamburger" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </a>
        </header>

        <div class="home-car-wrap">
          <model-viewer
            class="home-car-viewer"
            src="assets/turboporsche.glb?v=20260428"
            alt="3D car preview"
            camera-controls
            auto-rotate
            camera-orbit="0deg 78deg 76%"
            min-camera-orbit="auto auto 45%"
            max-camera-orbit="auto auto 140%"
            field-of-view="34deg"
            shadow-intensity="1"
            exposure="1"
            ar-status="not-presenting"
          ></model-viewer>
          <p class="home-car-viewer-note" id="carViewerNote">Loading 3D model...</p>
        </div>

        <nav class="home-quick-actions" aria-label="Quick actions">
          <a class="home-action-tile" href="page2.html" aria-label="Map">
            <img src="assets/location.png?v=20260428" alt="" />
          </a>
          <a class="home-action-tile" href="page3.html" aria-label="Parts and fluids">
            <img class="home-action-motor" src="assets/tire.png?v=20260429" alt="" />
          </a>
          <a class="home-action-tile" href="video.html" aria-label="Open videos">
            <img src="assets/playvideo.png?v=20260428" alt="" />
          </a>
          <a class="home-action-tile" href="notepad-2.html" aria-label="Open notepad">
            <img src="assets/pad.png?v=20260428" alt="" />
          </a>
        </nav>

        <section class="reminders-card" id="homeRemindersCard" aria-label="Reminders" role="link" tabindex="0">
          <div class="reminders-top-row">
            <h1>Reminders</h1>
            <a class="reminders-plus-link" href="reminders.html" aria-label="Open reminders">
              <img class="reminders-plus-icon" src="assets/arrowbox.png?v=20260429" alt="" />
            </a>
          </div>

          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Oil and Filter Change as done" aria-pressed="false"></button>
            <img class="home-oil-icon" src="assets/oil.png?v=20260428" alt="" />
            <span class="home-reminder-text">Oil and Filter Change</span>
          </article>
          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Battery Check as done" aria-pressed="false"></button>
            <img src="assets/battery.png?v=20260428" alt="" />
            <span class="home-reminder-text">Battery Check</span>
          </article>
          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Tire Rotation as done" aria-pressed="false"></button>
            <img src="assets/warn.png?v=20260428" alt="" />
            <span class="home-reminder-text">Tire Rotation</span>
          </article>
        </section>

        <section class="services-card" id="homeServicesCard" aria-label="Services done" role="link" tabindex="0">
          <div class="reminders-top-row">
            <h1 class="services-card-title">Services Done</h1>
            <a class="reminders-plus-link" href="notepad.html" aria-label="Open notepad">
              <img class="reminders-plus-icon" src="assets/arrowbox.png?v=20260429" alt="" />
            </a>
          </div>

          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Oil and Filter Change as done" aria-pressed="false"></button>
            <img class="home-oil-icon" src="assets/oil.png?v=20260428" alt="" />
            <span class="home-service-text">Oil and Filter Change</span>
          </article>
          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Battery Check as done" aria-pressed="false"></button>
            <img src="assets/battery.png?v=20260428" alt="" />
            <span class="home-service-text">Battery Check</span>
          </article>
          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Tire Rotation as done" aria-pressed="false"></button>
            <img src="assets/warn.png?v=20260428" alt="" />
            <span class="home-service-text">Tire Rotation</span>
          </article>
        </section>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script src="page-transitions.js"></script>
    <script>
      (async () => {
        const greeting = document.getElementById("homeGreeting");
        if (!greeting) return;

        const storedProfile = JSON.parse(localStorage.getItem("carDemoProfile") || "{}");
        const storedName = (storedProfile.name || "").trim();

        let sessionName = "";
        let emailFallback = "";
        if (window.getCarDemoSession) {
          const session = await window.getCarDemoSession();
          sessionName = (session?.user?.user_metadata?.name || "").trim();
          emailFallback = (session?.user?.email || "").trim();
        }

        const firstName = (storedName || sessionName || "").split(/\s+/)[0];
        const fallbackName = emailFallback ? emailFallback.split("@")[0] : "User";
        const finalName = firstName || fallbackName || "User";
        greeting.textContent = `Welcome, ${finalName}!`;
      })();

      const toggleReminderDot = async (dot) => {
        const table = dot.dataset.table;
        const entryId = dot.dataset.entryId;
        const userId = dot.dataset.userId;
        if (!table || !entryId || !userId || !window.carDemoSupabase) return;

        const isComplete = dot.getAttribute("aria-pressed") === "true";
        const next = !isComplete;
        dot.setAttribute("aria-pressed", String(next));
        dot.classList.toggle("is-complete", next);

        try {
          const { error } = await window.carDemoSupabase
            .from(table)
            .update({ completed: next })
            .eq("id", entryId)
            .eq("user_id", userId);

          if (error) {
            dot.setAttribute("aria-pressed", String(isComplete));
            dot.classList.toggle("is-complete", isComplete);
            window.carDemoToast?.(`Could not update: ${error.message}`, { isError: true, durationMs: 2200 });
          }
        } catch (e) {
          dot.setAttribute("aria-pressed", String(isComplete));
          dot.classList.toggle("is-complete", isComplete);
          window.carDemoToast?.("Could not update completed state.", { isError: true, durationMs: 2200 });
        }
      };

      document.addEventListener(
        "click",
        async (event) => {
          const dot = event.target.closest(".reminder-dot");
          if (!dot) return;
          event.preventDefault();
          event.stopPropagation();
          await toggleReminderDot(dot);
        },
        true
      );

      const homeRemindersCard = document.getElementById("homeRemindersCard");
      const homeServicesCard = document.getElementById("homeServicesCard");
      if (homeRemindersCard) {
        const openRemindersList = () => {
          window.location.href = "reminders-2.html";
        };

        homeRemindersCard.addEventListener("click", (event) => {
          if (event.target.closest(".reminders-plus-link")) return;
          if (event.target.closest(".reminder-dot")) return;
          openRemindersList();
        });

        homeRemindersCard.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openRemindersList();
          }
        });
      }

      if (homeServicesCard) {
        const openServicesList = () => {
          window.location.href = "notepad-2.html";
        };

        homeServicesCard.addEventListener("click", (event) => {
          if (event.target.closest(".reminders-plus-link")) return;
          if (event.target.closest(".reminder-dot")) return;
          openServicesList();
        });

        homeServicesCard.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openServicesList();
          }
        });
      }
    </script>
    <script>
      const carNote = document.getElementById("carViewerNote");
      const carViewer = document.querySelector(".home-car-viewer");
      if (carNote && carViewer) {
        const getStoredProfile = () => JSON.parse(localStorage.getItem("carDemoProfile") || "{}");
        const resolveModelSrc = (profile) => {
          const year = (profile.carYear || "").trim();
          const make = (profile.carMake || "").trim();
          const model = (profile.carModel || "").trim();

          if (year === "2018" && make === "Range Rover" && model === "Sport") {
            return "assets/Range Rover Sports 2018 (.GLB).glb?v=20260428";
          }
          if (year === "2020" && make === "Porsche" && model === "Turbo") {
            return "assets/turboporsche.glb?v=20260428";
          }
          if (year === "2022" && make === "Cadillac" && model === "CT5") {
            return "assets/cadillac.glb?v=20260428";
          }
          return "assets/turboporsche.glb?v=20260428";
        };

        carViewer.src = resolveModelSrc(getStoredProfile());

        carViewer.addEventListener("load", () => {
          carNote.textContent = "";
          carNote.classList.remove("is-error");
        });
        carViewer.addEventListener("error", () => {
          carNote.textContent = "Could not load 3D model file from assets.";
          carNote.classList.add("is-error");
        });
      }

      (async () => {
        const reminderTextNodes = document.querySelectorAll("#homeRemindersCard .home-reminder-text");
        if (!window.carDemoSupabase || !reminderTextNodes.length) return;
        const session = await window.getCarDemoSession();
        if (!session) return;

        const reminderDots = document.querySelectorAll("#homeRemindersCard .reminder-dot");
        let data = null;
        let error = null;

        ({ data, error } = await window.carDemoSupabase
          .from("reminders")
          .select("id,user_id,text,completed")
          .eq("user_id", session.user.id)
          .order("created_at", { ascending: false })
          .limit(3));

        if (error && String(error.message || "").toLowerCase().includes("completed")) {
          ({ data, error } = await window.carDemoSupabase
            .from("reminders")
            .select("id,user_id,text")
            .eq("user_id", session.user.id)
            .order("created_at", { ascending: false })
            .limit(3));
          if (data) data = data.map((row) => ({ ...row, completed: false }));
        }

        if (error) {
          window.carDemoToast?.(`Could not load reminders: ${error.message}`, { isError: true, durationMs: 2200 });
          return;
        }

        const fallback = ["No reminders yet", "No reminders yet", "No reminders yet"];
        reminderTextNodes.forEach((node, index) => {
          const entry = data?.[index];
          node.textContent = entry?.text || fallback[index];
          const dot = reminderDots[index];
          if (!dot) return;
          dot.dataset.table = "reminders";
          dot.dataset.entryId = entry?.id || "";
          dot.dataset.userId = entry?.user_id || "";
          dot.disabled = !entry;
          dot.setAttribute("aria-pressed", String(Boolean(entry?.completed)));
          dot.classList.toggle("is-complete", Boolean(entry?.completed));
        });
      })();

      (async () => {
        const serviceTextNodes = document.querySelectorAll("#homeServicesCard .home-service-text");
        const serviceDots = document.querySelectorAll("#homeServicesCard .reminder-dot");
        if (!window.carDemoSupabase || !serviceTextNodes.length) return;
        const session = await window.getCarDemoSession();
        if (!session) return;

        let data = null;
        let error = null;

        ({ data, error } = await window.carDemoSupabase
          .from("services_done")
          .select("id,user_id,text,completed")
          .eq("user_id", session.user.id)
          .order("created_at", { ascending: false })
          .limit(3));

        if (error && String(error.message || "").toLowerCase().includes("completed")) {
          ({ data, error } = await window.carDemoSupabase
            .from("services_done")
            .select("id,user_id,text")
            .eq("user_id", session.user.id)
            .order("created_at", { ascending: false })
            .limit(3));
          if (data) data = data.map((row) => ({ ...row, completed: false }));
        }

        if (error) {
          window.carDemoToast?.(`Could not load services: ${error.message}`, { isError: true, durationMs: 2200 });
          return;
        }

        const fallback = ["No services yet", "No services yet", "No services yet"];
        serviceTextNodes.forEach((node, index) => {
          const entry = data?.[index];
          node.textContent = entry?.text || fallback[index];
          const dot = serviceDots[index];
          if (!dot) return;
          dot.dataset.table = "services_done";
          dot.dataset.entryId = entry?.id || "";
          dot.dataset.userId = entry?.user_id || "";
          dot.disabled = !entry;
          dot.setAttribute("aria-pressed", String(Boolean(entry?.completed)));
          dot.classList.toggle("is-complete", Boolean(entry?.completed));
        });
      })();
    </script>
  </body>
</html>
