<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Figma Build</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen homepage redesigned-screen homepage--scrollable">
      <div class="homepage-scroll-stack">
        <header class="home-header">
          <p>Welcome, User!</p>
          <a class="home-menu-link" href="settings.html" aria-label="Open settings">
            <span class="home-menu-hamburger" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </a>
        </header>

        <div class="home-car-wrap">
          <div class="home-car-viewer" id="carViewer" role="img" aria-label="3D car preview"></div>
          <p class="home-car-viewer-note" id="carViewerNote">Loading 3D model...</p>
        </div>

        <nav class="home-quick-actions" aria-label="Quick actions">
          <a class="home-action-tile" href="page2.html" aria-label="Map">
            <img src="https://www.figma.com/api/mcp/asset/16cd1a29-7dd0-4606-a7cc-fca22b0c748e" alt="" />
          </a>
          <a class="home-action-tile" href="page3.html" aria-label="Parts and fluids">
            <img class="home-action-motor" src="https://www.figma.com/api/mcp/asset/cc2dfe34-7e68-4ec8-87e3-7ea72fe692cb" alt="" />
          </a>
          <span class="home-action-tile home-action-tile--empty" aria-hidden="true"></span>
          <a class="home-action-tile" href="settings.html" aria-label="Settings">
            <img src="https://www.figma.com/api/mcp/asset/099237fd-064b-41ef-bbf4-86b2c9a87182" alt="" />
          </a>
        </nav>

        <section class="reminders-card" aria-label="Reminders">
          <div class="reminders-top-row">
            <h1>Reminders</h1>
            <img class="reminders-plus-icon" src="https://www.figma.com/api/mcp/asset/2bbd45d5-b6ef-44da-99c2-91c13ca68fac" alt="" />
          </div>

          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Oil and Filter Change as done" aria-pressed="false"></button>
            <img src="https://www.figma.com/api/mcp/asset/3228db13-dfc7-40d0-840a-35bf5712f363" alt="" />
            <span>Oil and Filter Change</span>
          </article>
          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Battery Check as done" aria-pressed="false"></button>
            <img src="https://www.figma.com/api/mcp/asset/f82f53fd-ba34-4827-bd25-3ec8b8804839" alt="" />
            <span>Battery Check</span>
          </article>
          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Tire Rotation as done" aria-pressed="false"></button>
            <img src="https://www.figma.com/api/mcp/asset/2ec649fa-ee5d-4d2e-b626-f9cb6a9c03a6" alt="" />
            <span>Tire Rotation</span>
          </article>
        </section>

        <section class="services-card" aria-label="Recommended services by mileage">
          <div class="reminders-top-row">
            <h1 class="services-card-title">Recommended Services By Mileage</h1>
            <img class="reminders-plus-icon" src="https://www.figma.com/api/mcp/asset/2bbd45d5-b6ef-44da-99c2-91c13ca68fac" alt="" />
          </div>

          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Oil and Filter Change as done" aria-pressed="false"></button>
            <img src="https://www.figma.com/api/mcp/asset/3228db13-dfc7-40d0-840a-35bf5712f363" alt="" />
            <span>Oil and Filter Change</span>
          </article>
          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Battery Check as done" aria-pressed="false"></button>
            <img src="https://www.figma.com/api/mcp/asset/f82f53fd-ba34-4827-bd25-3ec8b8804839" alt="" />
            <span>Battery Check</span>
          </article>
          <article class="reminder-item">
            <button class="reminder-dot" type="button" aria-label="Mark Tire Rotation as done" aria-pressed="false"></button>
            <img src="https://www.figma.com/api/mcp/asset/2ec649fa-ee5d-4d2e-b626-f9cb6a9c03a6" alt="" />
            <span>Tire Rotation</span>
          </article>
        </section>
      </div>
    </main>
    <script src="page-transitions.js"></script>
    <script>
      document.querySelectorAll(".reminder-dot").forEach((dot) => {
        dot.addEventListener("click", () => {
          const isComplete = dot.getAttribute("aria-pressed") === "true";
          dot.setAttribute("aria-pressed", String(!isComplete));
          dot.classList.toggle("is-complete", !isComplete);
        });
      });
    </script>
    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";
      import { GLTFLoader } from "https://unpkg.com/three@0.164.1/examples/jsm/loaders/GLTFLoader.js";
      import { OrbitControls } from "https://unpkg.com/three@0.164.1/examples/jsm/controls/OrbitControls.js";

      const container = document.getElementById("carViewer");
      const note = document.getElementById("carViewerNote");
      if (!container || !note) {
        throw new Error("Car viewer container not found.");
      }

      const scene = new THREE.Scene();
      scene.background = null;

      const camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / container.clientHeight,
        0.01,
        1000
      );
      camera.position.set(0, 1.3, 5.2);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      container.appendChild(renderer.domElement);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.minDistance = 0.8;
      controls.maxDistance = 30;
      controls.target.set(0, 0.25, 0);

      scene.add(new THREE.AmbientLight(0xffffff, 1.5));
      const hemi = new THREE.HemisphereLight(0xffffff, 0x3a4a56, 1.25);
      scene.add(hemi);
      const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
      keyLight.position.set(5, 8, 6);
      scene.add(keyLight);
      const fillLight = new THREE.DirectionalLight(0xffffff, 1);
      fillLight.position.set(-5, 3, -3);
      scene.add(fillLight);

      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(3.4, 64),
        new THREE.MeshStandardMaterial({ color: 0x5f6d79, roughness: 0.9, metalness: 0.05 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -0.92;
      scene.add(floor);

      const loader = new GLTFLoader();
      const modelCandidates = [
        "assets/Range Rover Sports 2018 (.GLB).glb",
        encodeURI("assets/Range Rover Sports 2018 (.GLB).glb"),
        "./assets/Range Rover Sports 2018 (.GLB).glb",
        encodeURI("./assets/Range Rover Sports 2018 (.GLB).glb"),
      ];
      let carModel = null;
      const clock = new THREE.Clock();
      const isFileProtocol = window.location.protocol === "file:";

      if (isFileProtocol) {
        note.textContent = "Use a local server (not file://) to load .glb files.";
        note.classList.add("is-error");
      }

      const setupLoadedModel = (gltf) => {
        carModel = gltf.scene;
        scene.add(carModel);

        const box = new THREE.Box3().setFromObject(carModel);
        const center = box.getCenter(new THREE.Vector3());
        const sizeVec = box.getSize(new THREE.Vector3());
        const maxSize = Math.max(sizeVec.x, sizeVec.y, sizeVec.z);
        carModel.position.sub(center);
        carModel.position.y += maxSize * 0.15;

        const size = sizeVec.length();
        const fitScale = size > 0 ? 3.4 / size : 1;
        carModel.scale.setScalar(fitScale);

        const distance = maxSize > 0 ? maxSize * 1.45 : 4.5;
        camera.position.set(0, maxSize * 0.45, distance);
        camera.lookAt(0, maxSize * 0.2, 0);
        controls.target.set(0, maxSize * 0.2, 0);
        controls.update();
        note.textContent = "";
        note.classList.remove("is-error");
      };

      const tryLoadModel = (index = 0, lastError = null) => {
        if (index >= modelCandidates.length) {
          const details = lastError?.message || String(lastError || "Unknown loader error");
          note.textContent = `Could not load model. Tried ${modelCandidates.length} paths. Last error: ${details}`;
          note.classList.add("is-error");
          return;
        }

        loader.load(
          modelCandidates[index],
          (gltf) => setupLoadedModel(gltf),
          undefined,
          (error) => tryLoadModel(index + 1, error)
        );
      };

      tryLoadModel();

      const onResize = () => {
        const width = container.clientWidth;
        const height = container.clientHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      };
      window.addEventListener("resize", onResize);

      const animate = () => {
        const t = clock.getElapsedTime();
        if (carModel) {
          carModel.rotation.y = t * 0.45;
        }
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      };
      animate();
    </script>
  </body>
</html>
