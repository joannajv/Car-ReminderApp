<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen settings-screen redesigned-screen">
      <a class="top-icon-button settings-screen-back" href="index.html" aria-label="Back">
        <img src="assets/arrow.png?v=20260428" alt="" />
      </a>
      <div class="settings-tile" aria-current="page">
        <img class="settings-tile-icon" src="assets/settings.png?v=20260428" alt="" />
        <span>Settings</span>
      </div>
      <button class="settings-logout-btn" id="settingsLogoutBtn" type="button">Log Out</button>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script>
      const settingsLogoutBtn = document.getElementById("settingsLogoutBtn");
      settingsLogoutBtn?.addEventListener("click", async () => {
        await window.signOutCarDemo("login.html");
      });
    </script>
    <script src="page-transitions.js"></script>
  </body>
</html>
