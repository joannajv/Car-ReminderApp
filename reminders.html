<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Reminders</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen fig-sheet-screen redesigned-screen">
      <section class="fig-sheet fig-sheet--single">
        <div class="fig-sheet-head">
          <h1>Reminders</h1>
          <a class="fig-sheet-close" href="index.html" aria-label="Close">×</a>
        </div>

        <div class="fig-service-pill fig-service-pill--top">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <input
            id="reminderTextInput"
            class="fig-reminder-input"
            type="text"
            placeholder="Write your reminder"
            aria-label="Reminder text"
          />
        </div>

        <div class="fig-time-block">
          <p>Date</p>
          <div class="fig-mini-pills">
            <input class="fig-mini-input" type="number" min="1" max="12" placeholder="MM" aria-label="Month" />
            <input class="fig-mini-input" type="number" min="1" max="31" placeholder="DD" aria-label="Day" />
            <input class="fig-mini-input" type="number" min="2024" max="2099" placeholder="YYYY" aria-label="Year" />
          </div>
        </div>

        <div class="fig-time-block fig-time-block--second">
          <p>Time</p>
          <div class="fig-mini-pills">
            <input class="fig-mini-input" type="number" min="1" max="12" placeholder="HH" aria-label="Hour" />
            <input class="fig-mini-input" type="number" min="0" max="59" placeholder="MM" aria-label="Minute" />
            <select class="fig-mini-input" aria-label="AM or PM">
              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>

        <a class="fig-save-pill" id="saveReminderBtn" href="reminders-2.html">Save</a>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script>
      const saveReminderBtn = document.getElementById("saveReminderBtn");
      const reminderTextInput = document.getElementById("reminderTextInput");
      const monthInput = document.querySelector('input[aria-label="Month"]');
      const dayInput = document.querySelector('input[aria-label="Day"]');
      const yearInput = document.querySelector('input[aria-label="Year"]');
      const hourInput = document.querySelector('input[aria-label="Hour"]');
      const minuteInput = document.querySelector('input[aria-label="Minute"]');
      const amPmInput = document.querySelector('select[aria-label="AM or PM"]');

      if (saveReminderBtn && reminderTextInput) {
        saveReminderBtn.addEventListener("click", async (event) => {
          event.preventDefault();
          if (!window.carDemoSupabase) return;
          const session = await window.getCarDemoSession();
          if (!session) return;

          const reminderText = reminderTextInput.value.trim() || "Untitled reminder";
          const dateText = `${monthInput?.value || "--"}/${dayInput?.value || "--"}/${yearInput?.value || "----"}`;
          const timeText = `${hourInput?.value || "--"}:${minuteInput?.value || "--"} ${amPmInput?.value || "AM"}`;

          const { error } = await window.carDemoSupabase.from("reminders").insert({
            user_id: session.user.id,
            text: reminderText,
            date_text: dateText,
            time_text: timeText,
          });

          if (!error) {
            window.location.href = "reminders-2.html";
          }
        });
      }
    </script>
    <script src="page-transitions.js"></script>
  </body>
</html>
