<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Notepad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen fig-sheet-screen redesigned-screen">
      <section class="fig-sheet fig-sheet--single">
        <div class="fig-sheet-head">
          <h1>Services Done</h1>
          <a class="fig-sheet-close" href="index.html" aria-label="Close">×</a>
        </div>

        <div class="fig-service-pill fig-service-pill--top">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <input
            id="serviceTextInput"
            class="fig-reminder-input"
            type="text"
            placeholder="Write service done"
            aria-label="Service done text"
          />
        </div>

        <div class="fig-time-block">
          <p>Date</p>
          <div class="fig-mini-pills">
            <input class="fig-mini-input" type="number" min="1" max="12" placeholder="MM" aria-label="Month" />
            <input class="fig-mini-input" type="number" min="1" max="31" placeholder="DD" aria-label="Day" />
            <input class="fig-mini-input" type="number" min="2024" max="2099" placeholder="YYYY" aria-label="Year" />
          </div>
        </div>

        <div class="fig-time-block fig-time-block--second">
          <p>Time</p>
          <div class="fig-mini-pills">
            <input class="fig-mini-input" type="number" min="1" max="12" placeholder="HH" aria-label="Hour" />
            <input class="fig-mini-input" type="number" min="0" max="59" placeholder="MM" aria-label="Minute" />
            <select class="fig-mini-input" aria-label="AM or PM">
              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>

        <a class="fig-save-pill" id="saveServiceBtn" href="notepad-2.html">Save</a>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script src="page-transitions.js"></script>
  </body>
</html>
