<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Notepad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen fig-sheet-screen redesigned-screen">
      <section class="fig-sheet fig-sheet--single">
        <div class="fig-sheet-head">
          <h1>Services Done</h1>
          <a class="fig-sheet-close" href="index.html" aria-label="Close">×</a>
        </div>

        <div class="fig-service-pill fig-service-pill--top">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <input
            id="serviceTextInput"
            class="fig-reminder-input"
            type="text"
            placeholder="Write service done"
            aria-label="Service done text"
          />
        </div>

        <div class="fig-time-block">
          <p>Date</p>
          <div class="fig-mini-pills">
            <select class="fig-mini-input" aria-label="Month"></select>
            <select class="fig-mini-input" aria-label="Day"></select>
            <select class="fig-mini-input" aria-label="Year"></select>
          </div>
        </div>

        <div class="fig-time-block fig-time-block--second">
          <p>Time</p>
          <div class="fig-mini-pills">
            <select class="fig-mini-input" aria-label="Hour"></select>
            <select class="fig-mini-input" aria-label="Minute"></select>
            <select class="fig-mini-input" aria-label="AM or PM">
              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>

        <a class="fig-save-pill" id="saveServiceBtn" href="notepad-2.html">Save</a>
        <p class="service-status" id="serviceStatus" aria-live="polite"></p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script>
      const saveServiceBtn = document.getElementById("saveServiceBtn");
      const serviceTextInput = document.getElementById("serviceTextInput");
      const serviceMonthInput = document.querySelector('select[aria-label="Month"]');
      const serviceDayInput = document.querySelector('select[aria-label="Day"]');
      const serviceYearInput = document.querySelector('select[aria-label="Year"]');
      const serviceHourInput = document.querySelector('select[aria-label="Hour"]');
      const serviceMinuteInput = document.querySelector('select[aria-label="Minute"]');
      const serviceAmPmInput = document.querySelector('select[aria-label="AM or PM"]');
      const serviceStatus = document.getElementById("serviceStatus");
      const pad2 = (value) => String(value).padStart(2, "0");

      const makeOptions = (selectEl, start, end, pad = false) => {
        if (!selectEl) return;
        selectEl.innerHTML = "";
        for (let i = start; i <= end; i += 1) {
          const option = document.createElement("option");
          option.value = String(i);
          option.textContent = pad ? pad2(i) : String(i);
          selectEl.appendChild(option);
        }
      };

      const syncServiceDayOptions = () => {
        if (!serviceMonthInput || !serviceDayInput || !serviceYearInput) return;
        const month = Number(serviceMonthInput.value);
        const year = Number(serviceYearInput.value);
        if (!month || !year) return;
        const maxDays = new Date(year, month, 0).getDate();
        const previousDay = Number(serviceDayInput.value || 1);
        makeOptions(serviceDayInput, 1, maxDays, true);
        serviceDayInput.value = String(Math.min(previousDay, maxDays));
      };

      const initializeServicePickers = () => {
        if (
          !serviceMonthInput ||
          !serviceDayInput ||
          !serviceYearInput ||
          !serviceHourInput ||
          !serviceMinuteInput ||
          !serviceAmPmInput
        ) {
          return;
        }

        const now = new Date();
        now.setSeconds(0, 0);

        makeOptions(serviceMonthInput, 1, 12, true);
        makeOptions(serviceYearInput, now.getFullYear() - 2, now.getFullYear() + 3);
        makeOptions(serviceHourInput, 1, 12, true);
        makeOptions(serviceMinuteInput, 0, 59, true);

        serviceMonthInput.value = String(now.getMonth() + 1);
        serviceYearInput.value = String(now.getFullYear());
        syncServiceDayOptions();
        serviceDayInput.value = String(now.getDate());

        let hour = now.getHours();
        const amPm = hour >= 12 ? "PM" : "AM";
        hour = hour % 12 || 12;
        serviceHourInput.value = String(hour);
        serviceMinuteInput.value = String(now.getMinutes());
        serviceAmPmInput.value = amPm;

        serviceMonthInput.addEventListener("change", syncServiceDayOptions);
        serviceYearInput.addEventListener("change", syncServiceDayOptions);
      };

      initializeServicePickers();

      saveServiceBtn?.addEventListener("click", async (event) => {
        event.preventDefault();
        if (!window.carDemoSupabase) {
          if (serviceStatus) {
            serviceStatus.textContent = "Supabase is not configured.";
            serviceStatus.classList.add("is-error");
          }
          return;
        }
        const session = await window.getCarDemoSession();
        if (!session) {
          if (serviceStatus) {
            serviceStatus.textContent = "Please sign in again.";
            serviceStatus.classList.add("is-error");
          }
          return;
        }

        const text = serviceTextInput?.value.trim() || "Untitled service";
        const dateText = `${pad2(serviceMonthInput?.value || "--")}/${pad2(serviceDayInput?.value || "--")}/${serviceYearInput?.value || "----"}`;
        const timeText = `${pad2(serviceHourInput?.value || "--")}:${pad2(serviceMinuteInput?.value || "--")} ${serviceAmPmInput?.value || "AM"}`;

        saveServiceBtn.classList.add("is-disabled");
        saveServiceBtn.setAttribute("aria-disabled", "true");
        const prevLabel = saveServiceBtn.textContent;
        saveServiceBtn.textContent = "Saving...";

        const { error } = await window.carDemoSupabase.from("services_done").insert({
          user_id: session.user.id,
          text,
          date_text: dateText,
          time_text: timeText,
        });

        saveServiceBtn.classList.remove("is-disabled");
        saveServiceBtn.removeAttribute("aria-disabled");
        saveServiceBtn.textContent = prevLabel;

        if (error) {
          if (serviceStatus) {
            serviceStatus.textContent = `Could not save: ${error.message}`;
            serviceStatus.classList.add("is-error");
          }
          window.carDemoToast?.(`Could not save: ${error.message}`, { isError: true });
          return;
        }

        if (serviceStatus) {
          serviceStatus.textContent = "";
          serviceStatus.classList.remove("is-error");
        }
        window.carDemoToast?.("Service saved");
        setTimeout(() => {
          window.location.href = "notepad-2.html";
        }, 450);
      });
    </script>
    <script src="page-transitions.js"></script>
  </body>
</html>
