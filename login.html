<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#374957" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Car Buddy" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/blob.png" />
    <title>Car App - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen auth-screen redesigned-screen">
      <section class="auth-brand">
        <img class="auth-brand-icon" src="https://www.figma.com/api/mcp/asset/8e189633-393b-41d3-8aa1-de4e69bef1c5" alt="" />
        <h1>Car Buddy</h1>
      </section>

      <section class="auth-panel auth-panel--login">
        <h2>Sign In</h2>
        <p class="auth-helper">Use your account to sync reminders across devices.</p>

        <label class="auth-field-label" for="authEmail">Email</label>
        <input class="auth-field-input" id="authEmail" type="email" />

        <label class="auth-field-label auth-field-label--spaced" for="authPassword">Password</label>
        <input class="auth-field-input" id="authPassword" type="password" />

        <button class="auth-primary-btn" id="signInBtn" type="button">Log In</button>
        <button class="auth-primary-btn auth-primary-btn--secondary" id="signUpBtn" type="button">Create Account</button>
        <p class="auth-status" id="authStatus" aria-live="polite"></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script>
      const authEmail = document.getElementById("authEmail");
      const authPassword = document.getElementById("authPassword");
      const signInBtn = document.getElementById("signInBtn");
      const signUpBtn = document.getElementById("signUpBtn");
      const authStatus = document.getElementById("authStatus");

      const setStatus = (msg, isError = false) => {
        authStatus.textContent = msg;
        authStatus.classList.toggle("is-error", isError);
      };

      const getCredentials = () => {
        const email = authEmail.value.trim();
        const password = authPassword.value;
        if (!email || !password) {
          setStatus("Email and password are required.", true);
          return null;
        }
        return { email, password };
      };

      signInBtn?.addEventListener("click", async () => {
        if (!window.carDemoSupabase) return setStatus("Supabase is not configured yet.", true);
        const creds = getCredentials();
        if (!creds) return;
        setStatus("Signing in...");
        const { error } = await window.carDemoSupabase.auth.signInWithPassword(creds);
        if (error) return setStatus(error.message, true);
        window.location.href = "index.html";
      });

      signUpBtn?.addEventListener("click", () => {
        window.location.href = "create-account.html";
      });

    </script>
  </body>
</html>
