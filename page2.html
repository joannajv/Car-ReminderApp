<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Map</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen map redesigned-screen">
      <a class="top-icon-button map-back-button" href="index.html" aria-label="Back to homepage">
        <img src="https://www.figma.com/api/mcp/asset/640f94a2-3914-4e52-8985-2677a0c18f66" alt="" />
      </a>
      <div class="map-stage" aria-hidden="true">
        <img
          class="map-bg-image"
          src="https://www.figma.com/api/mcp/asset/7494d72e-f8d6-48a2-ab55-05a27c3c4d57"
          alt=""
        />
      </div>
      <aside class="mechanic-sheet" aria-label="Mechanic details">
        <img
          class="mechanic-sheet-photo"
          src="https://www.figma.com/api/mcp/asset/8e3a2042-5384-4c64-bd5e-935c0a2590fd"
          alt="Shop interior"
        />
        <img
          class="mechanic-sheet-pin"
          src="assets/location.png?v=20260428"
          alt=""
        />
        <div class="mechanic-sheet-copy">
          <p class="mechanic-sheet-heading">Mechanic Info</p>
          <p>Number</p>
          <p>Address</p>
          <p>Rating</p>
          <p>$$$</p>
        </div>
      </aside>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script src="page-transitions.js"></script>
  </body>
</html>
