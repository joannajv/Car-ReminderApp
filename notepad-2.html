<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Notepad 2</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen fig-sheet-screen redesigned-screen">
      <section class="fig-sheet fig-sheet--recent">
        <div class="fig-sheet-head">
          <h1>Recent</h1>
          <a class="fig-sheet-close" href="index.html" aria-label="Close">×</a>
        </div>

        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="service-recent-text">Example Service</span>
        </div>
        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="service-recent-text">Example Service</span>
        </div>
        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="service-recent-text">Example Service</span>
        </div>
      </section>

      <section class="fig-sheet fig-sheet--past">
        <div class="fig-sheet-head">
          <h1>Past</h1>
          <a class="fig-sheet-close" href="index.html" aria-label="Close">×</a>
        </div>

        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="service-past-text">Example Service</span>
        </div>
        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="service-past-text">Example Service</span>
        </div>
        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="service-past-text">Example Service</span>
        </div>
        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="service-past-text">Example Service</span>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script src="page-transitions.js"></script>
  </body>
</html>
