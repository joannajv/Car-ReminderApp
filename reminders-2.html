<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Reminders 2</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen fig-sheet-screen redesigned-screen">
      <section class="fig-sheet fig-sheet--single">
        <div class="fig-sheet-head">
          <h1>Reminders</h1>
          <a class="fig-sheet-close" href="index.html" aria-label="Close">×</a>
        </div>

        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="saved-reminder-text">Example Service</span>
        </div>
        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="saved-reminder-text">Example Service</span>
        </div>
        <div class="fig-service-pill">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <span class="saved-reminder-text">Example Service</span>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script>
      const reminderTextNodes = document.querySelectorAll(".saved-reminder-text");

      (async () => {
        if (!window.carDemoSupabase || !reminderTextNodes.length) return;
        const session = await window.getCarDemoSession();
        if (!session) return;

        const { data, error } = await window.carDemoSupabase
          .from("reminders")
          .select("text,date_text,time_text")
          .eq("user_id", session.user.id)
          .order("created_at", { ascending: false })
          .limit(3);

        if (error || !data || !data.length) return;

        reminderTextNodes.forEach((node, index) => {
          const entry = data[index];
          if (entry) {
            node.textContent = `${entry.text} (${entry.date_text} ${entry.time_text})`;
          }
        });
      })();
    </script>
    <script src="page-transitions.js"></script>
  </body>
</html>
