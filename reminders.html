<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car App - Reminders</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen fig-sheet-screen redesigned-screen">
      <section class="fig-sheet fig-sheet--single">
        <div class="fig-sheet-head">
          <h1>Reminders</h1>
          <a class="fig-sheet-close" href="index.html" aria-label="Close">×</a>
        </div>

        <div class="fig-service-pill fig-service-pill--top">
          <span class="fig-service-dot" aria-hidden="true"></span>
          <input
            id="reminderTextInput"
            class="fig-reminder-input"
            type="text"
            placeholder="Write your reminder"
            aria-label="Reminder text"
          />
        </div>

        <div class="fig-time-block">
          <p>Date</p>
          <div class="fig-mini-pills">
            <select class="fig-mini-input" aria-label="Month"></select>
            <select class="fig-mini-input" aria-label="Day"></select>
            <select class="fig-mini-input" aria-label="Year"></select>
          </div>
        </div>

        <div class="fig-time-block fig-time-block--second">
          <p>Time</p>
          <div class="fig-mini-pills">
            <select class="fig-mini-input" aria-label="Hour"></select>
            <select class="fig-mini-input" aria-label="Minute"></select>
            <select class="fig-mini-input" aria-label="AM or PM">
              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>

        <a class="fig-save-pill" id="saveReminderBtn" href="reminders-2.html">Save</a>
        <p class="service-status" id="reminderStatus" aria-live="polite"></p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script>
      const saveReminderBtn = document.getElementById("saveReminderBtn");
      const reminderTextInput = document.getElementById("reminderTextInput");
      const monthInput = document.querySelector('select[aria-label="Month"]');
      const dayInput = document.querySelector('select[aria-label="Day"]');
      const yearInput = document.querySelector('select[aria-label="Year"]');
      const hourInput = document.querySelector('select[aria-label="Hour"]');
      const minuteInput = document.querySelector('select[aria-label="Minute"]');
      const amPmInput = document.querySelector('select[aria-label="AM or PM"]');
      const reminderStatus = document.getElementById("reminderStatus");

      const pad2 = (value) => String(value).padStart(2, "0");
      const formatPart = (value, fallback = "--") => {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) return fallback;
        return pad2(numeric);
      };

      const addPlaceholderOption = (selectEl, label) => {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = label;
        selectEl.appendChild(option);
      };

      const makeOptions = (selectEl, start, end, pad = false, placeholderLabel = "") => {
        if (!selectEl) return;
        selectEl.innerHTML = "";
        if (placeholderLabel) {
          addPlaceholderOption(selectEl, placeholderLabel);
        }
        for (let i = start; i <= end; i += 1) {
          const option = document.createElement("option");
          option.value = String(i);
          option.textContent = pad ? pad2(i) : String(i);
          selectEl.appendChild(option);
        }
      };

      const syncDayOptions = () => {
        if (!monthInput || !dayInput || !yearInput) return;
        const month = Number(monthInput.value);
        const fallbackYear = new Date().getFullYear();
        const year = Number(yearInput.value) || fallbackYear;
        if (!month) {
          dayInput.innerHTML = "";
          addPlaceholderOption(dayInput, "DD");
          return;
        }

        const maxDays = new Date(year, month, 0).getDate();
        const previousDay = Number(dayInput.value || 0);
        makeOptions(dayInput, 1, maxDays, true, "DD");
        if (previousDay >= 1 && previousDay <= maxDays) {
          dayInput.value = String(previousDay);
        }
      };

      const initializeReminderPickers = () => {
        if (!monthInput || !dayInput || !yearInput || !hourInput || !minuteInput || !amPmInput) return;

        const now = new Date();
        makeOptions(monthInput, 1, 12, true, "MM");
        makeOptions(yearInput, now.getFullYear(), now.getFullYear() + 3, false, "YYYY");
        makeOptions(hourInput, 1, 12, true, "HH");
        makeOptions(minuteInput, 0, 59, true, "MM");
        dayInput.innerHTML = "";
        addPlaceholderOption(dayInput, "DD");
        syncDayOptions();
        amPmInput.value = "AM";

        monthInput.addEventListener("change", syncDayOptions);
        yearInput.addEventListener("change", syncDayOptions);
      };

      initializeReminderPickers();

      const toNotifyAtIso = () => {
        const month = Number(monthInput?.value || "");
        const day = Number(dayInput?.value || "");
        const year = Number(yearInput?.value || "");
        const hour12 = Number(hourInput?.value || "");
        const minute = Number(minuteInput?.value || "");
        const amPm = (amPmInput?.value || "AM").toUpperCase();

        if (
          !Number.isInteger(month) ||
          !Number.isInteger(day) ||
          !Number.isInteger(year) ||
          !Number.isInteger(hour12) ||
          !Number.isInteger(minute) ||
          month < 1 ||
          month > 12 ||
          day < 1 ||
          day > 31 ||
          year < 2024 ||
          year > 2099 ||
          hour12 < 1 ||
          hour12 > 12 ||
          minute < 0 ||
          minute > 59
        ) {
          return null;
        }

        const hour24 = (hour12 % 12) + (amPm === "PM" ? 12 : 0);
        const localDate = new Date(year, month - 1, day, hour24, minute, 0, 0);
        if (Number.isNaN(localDate.getTime())) return null;
        if (
          localDate.getFullYear() !== year ||
          localDate.getMonth() !== month - 1 ||
          localDate.getDate() !== day
        ) {
          return null;
        }
        if (localDate.getTime() <= Date.now()) {
          return "PAST";
        }
        return localDate.toISOString();
      };

      if (saveReminderBtn && reminderTextInput) {
        saveReminderBtn.addEventListener("click", async (event) => {
          event.preventDefault();
          const setSavingState = (saving, label = "Save") => {
            saveReminderBtn.classList.toggle("is-disabled", saving);
            if (saving) {
              saveReminderBtn.setAttribute("aria-disabled", "true");
              saveReminderBtn.textContent = "Saving...";
            } else {
              saveReminderBtn.removeAttribute("aria-disabled");
              saveReminderBtn.textContent = label;
            }
          };

          const previousLabel = saveReminderBtn.textContent;
          if (!window.carDemoSupabase) {
            reminderStatus.textContent = "Supabase is not configured.";
            reminderStatus.classList.add("is-error");
            return;
          }
          const session = await window.getCarDemoSession();
          if (!session) {
            reminderStatus.textContent = "Please sign in again.";
            reminderStatus.classList.add("is-error");
            return;
          }

          const reminderText = reminderTextInput.value.trim() || "Untitled reminder";
          const dateText = `${formatPart(monthInput?.value)}/${formatPart(dayInput?.value)}/${yearInput?.value || "----"}`;
          const timeText = `${formatPart(hourInput?.value)}:${formatPart(minuteInput?.value)} ${amPmInput?.value || "AM"}`;
          const notifyAtIso = toNotifyAtIso();
          if (!notifyAtIso) {
            reminderStatus.textContent = "Enter a valid date and time to schedule this reminder.";
            reminderStatus.classList.add("is-error");
            return;
          }
          if (notifyAtIso === "PAST") {
            reminderStatus.textContent = "Reminder time must be in the future.";
            reminderStatus.classList.add("is-error");
            return;
          }

          setSavingState(true, previousLabel);
          try {
            const { error } = await window.carDemoSupabase.from("reminders").insert({
              user_id: session.user.id,
              text: reminderText,
              date_text: dateText,
              time_text: timeText,
              notify_at: notifyAtIso,
            });

            if (error) {
              window.carDemoToast?.(`Could not save: ${error.message}`, { isError: true });
              reminderStatus.textContent = `Could not save: ${error.message}`;
              reminderStatus.classList.add("is-error");
              return;
            }

            reminderStatus.textContent = "";
            reminderStatus.classList.remove("is-error");
            window.carDemoToast?.("Reminder saved");
            setTimeout(() => {
              window.location.href = "reminders-2.html";
            }, 450);
          } catch (error) {
            const message = error?.message || "Unexpected save error.";
            window.carDemoToast?.(`Could not save: ${message}`, { isError: true });
            reminderStatus.textContent = `Could not save: ${message}`;
            reminderStatus.classList.add("is-error");
          } finally {
            setSavingState(false, previousLabel);
          }
        });
      }
    </script>
    <script src="page-transitions.js"></script>
  </body>
</html>
